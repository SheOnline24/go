<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Online</title>
<style>
body { font-family: Arial, sans-serif; background: #111; color: #fff; text-align: center; padding: 50px; }
button { padding: 14px 25px; font-size: 18px; background:#ff2e63; color:white; border:none; border-radius:8px; cursor:pointer; margin:10px; }
#chat, #fakeTyping, #returnBlock { display: none; margin-top: 30px; }
.fakeTyping { font-style: italic; color: #aaa; margin-top: 20px; }
</style>
</head>
<body>

<h1>She is online...</h1>

<div id="chat">
  <p>Waiting for your message</p>
  <button id="joinTelegram">Join Telegram</button>
</div>

<div id="fakeTyping" class="fakeTyping"></div>

<div id="returnBlock">
  <h2></h2>
  <p></p>
  <button id="datingButton"></button>
  <button id="casinoButton"></button>
</div>

<script>
// ===== Настройки офферов =====
const DATING = "https://tone.affomelody.com/click?pid=6350&offer_id=25";

// GEO‑подбор Casino оффера
let casinoOffer;
const lang = navigator.language.split('-')[0];
if(lang === 'ru' || lang === 'pl'){
  casinoOffer = "https://ru-casino.com";
} else {
  casinoOffer = "https://en-casino.com";
}

// ===== Локализация =====
const locales = {
  en: { typing: "She is typing...", starRequired: "⭐ Telegram Stars required", noStars: "You don't have Stars", dating: "Continue to Dating", casino: "Get Casino Bonus 🎁" },
  ru: { typing: "Она печатает...", starRequired: "⭐ Требуются Telegram Stars", noStars: "У тебя нет Stars", dating: "Перейти на Dating", casino: "Получить бонус Казино 🎁" },
  de: { typing: "Sie tippt...", starRequired: "⭐ Telegram Stars erforderlich", noStars: "Du hast keine Stars", dating: "Zu Dating", casino: "Casino Bonus 🎁" },
  fr: { typing: "Elle écrit...", starRequired: "⭐ Telegram Stars requis", noStars: "Tu n'as pas de Stars", dating: "Continuer sur Dating", casino: "Bonus Casino 🎁" },
  es: { typing: "Ella está escribiendo...", starRequired: "⭐ Se requieren Telegram Stars", noStars: "No tienes Stars", dating: "Ir a Dating", casino: "Bono Casino 🎁" },
  it: { typing: "Sta scrivendo...", starRequired: "⭐ Telegram Stars richiesti", noStars: "Non hai Stars", dating: "Vai a Dating", casino: "Bonus Casino 🎁" },
  nl: { typing: "Ze is aan het typen...", starRequired: "⭐ Telegram Stars vereist", noStars: "Je hebt geen Stars", dating: "Ga naar Dating", casino: "Casino Bonus 🎁" },
  pl: { typing: "Ona pisze...", starRequired: "⭐ Wymagane Telegram Stars", noStars: "Nie masz Stars", dating: "Przejdź do Dating", casino: "Bonus Casino 🎁" },
  pt: { typing: "Ela está digitando...", starRequired: "⭐ Telegram Stars necessários", noStars: "Você não tem Stars", dating: "Ir para Dating", casino: "Bônus Casino 🎁" },
  tr: { typing: "O yazıyor...", starRequired: "⭐ Telegram Stars gerekli", noStars: "Stars yok", dating: "Dating'e devam et", casino: "Casino Bonus 🎁" }
};

const text = locales[lang] || locales['en'];

// ===== Подставляем тексты =====
document.getElementById("fakeTyping").innerText = text.typing;
const returnBlock = document.getElementById("returnBlock");
returnBlock.querySelector("h2").innerText = text.starRequired;
returnBlock.querySelector("p").innerText = text.noStars;
document.getElementById("datingButton").innerText = text.dating;
document.getElementById("casinoButton").innerText = text.casino;

// ===== Telegram переход =====
let tgTime = null;
document.getElementById("chat").style.display = "block";
document.getElementById("joinTelegram").addEventListener("click", () => {
  tgTime = Date.now();
  localStorage.setItem("tg_time", tgTime);
  window.location.href = "https://t.me/+NFHjJC5nOndlZjky";
});

// ===== Возврат на страницу =====
function checkReturn() {
  const storedTime = localStorage.getItem("tg_time");
  if(storedTime){
    const diff = Date.now() - storedTime;
    if(diff > 1500){
      showReturnBlock();
      localStorage.removeItem("tg_time");
    }
  }
}

window.addEventListener("load", checkReturn);
document.addEventListener("visibilitychange", () => { if(!document.hidden){ setTimeout(checkReturn, 300); } });
window.addEventListener("focus", () => { setTimeout(checkReturn, 300); });
setInterval(checkReturn, 2000);

// ===== Показ блока после возврата =====
function showReturnBlock() {
  document.getElementById("chat").style.display = "none";
  const typing = document.getElementById("fakeTyping");
  typing.style.display = "block";
  setTimeout(() => {
    typing.innerText = text.typing;
    setTimeout(() => {
      typing.style.display = "none";
      returnBlock.style.display = "block";
    }, 2000);
  }, 2000);
}

// ===== Кнопки офферов =====
document.getElementById("datingButton").addEventListener("click", () => {
  window.location.href = DATING;
});

document.getElementById("casinoButton").addEventListener("click", () => {
  window.location.href = casinoOffer;
});

// ===== Автослив на Dating через 3-5 сек =====
setTimeout(() => {
  if(returnBlock.style.display === "block") {
    window.location.href = DATING;
  }
}, 4000);

// ===== Анимация заголовка вкладки =====
const titles = ["Online", "● She is typing...", "New message 💬", "Online"];
let titleIndex = 0;
setInterval(() => {
  document.title = titles[titleIndex];
  titleIndex++;
  if(titleIndex >= titles.length){ titleIndex = 0; }
}, 2000);

</script>

</body>
</html>
