<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta http-equiv="Cache-Control" content="no-store">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<title>Online</title>

<style>
body{
font-family:Arial,sans-serif;
background:#111;
color:#fff;
text-align:center;
padding:50px;
}

button{
padding:14px 25px;
font-size:18px;
background:#ff2e63;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:20px;
}

#chat,#typing,#returnBlock,#casinoPopup{
display:none;
margin-top:30px;
}

.fakeTyping{
font-style:italic;
color:#aaa;
margin-top:20px;
}
</style>
</head>

<body>

<h1>She is online...</h1>

<div id="chat">
<p>Waiting for your message</p>
<button id="joinTelegram">Join Telegram</button>
</div>

<div id="typing" class="fakeTyping"></div>

<div id="returnBlock">
<h2></h2>
<p></p>
<button id="continueBtn"></button>
</div>

<div id="casinoPopup">
<h2>🎁 Bonus available!</h2>
<button id="casinoBtn">Get Bonus</button>
</div>

<script>

// ===== ТВОИ ОФФЕРЫ =====
const DATING="https://tone.affomelody.com/click?pid=6350&offer_id=25";
const CASINO="https://onlinepnpbit.com/2Vi4txHl/";

// ===== Локализация =====
const locales={
en:{typing:"She is typing...",star:"⭐ Telegram Stars required",nostars:"You don't have Stars",continue:"Continue without Stars"},
ru:{typing:"Она печатает...",star:"⭐ Требуются Telegram Stars",nostars:"У тебя нет Stars",continue:"Продолжить без Stars"},
de:{typing:"Sie tippt...",star:"⭐ Telegram Stars erforderlich",nostars:"Du hast keine Stars",continue:"Ohne Stars fortfahren"},
es:{typing:"Ella está escribiendo...",star:"⭐ Se requieren Telegram Stars",nostars:"No tienes Stars",continue:"Continuar sin Stars"},
fr:{typing:"Elle écrit...",star:"⭐ Telegram Stars requis",nostars:"Tu n'as pas de Stars",continue:"Continuer sans Stars"},
it:{typing:"Sta scrivendo...",star:"⭐ Telegram Stars richiesti",nostars:"Non hai Stars",continue:"Continua senza Stars"},
nl:{typing:"Ze is aan het typen...",star:"⭐ Telegram Stars vereist",nostars:"Je hebt geen Stars",continue:"Doorgaan zonder Stars"}
};

const lang=navigator.language.split('-')[0];
const text=locales[lang]||locales.en;

document.getElementById("typing").innerText=text.typing;
document.querySelector("#returnBlock h2").innerText=text.star;
document.querySelector("#returnBlock p").innerText=text.nostars;
document.getElementById("continueBtn").innerText=text.continue;

// ===== показываем первый экран =====
const chat=document.getElementById("chat");
chat.style.display="block";

// ===== TELEGRAM ПЕРЕХОД =====
document.getElementById("joinTelegram").onclick=function(){

localStorage.setItem("tg_click","1");
localStorage.setItem("tg_time",Date.now());

window.location.href="https://t.me/+NFHjJC5nOndlZjky";

};

// ===== ПРОВЕРКА ВОЗВРАТА =====
function checkReturn(){

const tg=localStorage.getItem("tg_click");

if(tg){

const time=localStorage.getItem("tg_time");

if(Date.now()-time>1500){

showReturn();

localStorage.removeItem("tg_click");

}

}

}

document.addEventListener("visibilitychange",function(){

if(!document.hidden){

checkReturn();

}

});

// ===== ЛОГИКА ВОЗВРАТА =====
function showReturn(){

chat.style.display="none";

const typing=document.getElementById("typing");

typing.style.display="block";

setTimeout(function(){

typing.style.display="none";

document.getElementById("returnBlock").style.display="block";

},3000);

}

// ===== КЛИК НА ДЕЙТИНГ =====
document.getElementById("continueBtn").onclick=function(){

window.location.href=DATING;

setTimeout(function(){

document.getElementById("casinoPopup").style.display="block";

},30000);

};

// ===== КАЗИНО =====
document.getElementById("casinoBtn").onclick=function(){

window.location.href=CASINO;

};

</script>

</body>
</html>
